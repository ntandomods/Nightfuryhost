services:
  # ── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: nightfury-hosting-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URI
        value: "mongodb+srv://ntandomods_db_user:S1tjiS2IZorNntby@nighyfury.su7vvsq.mongodb.net/?appName=Nighyfury"
      - key: RENDER_API_KEY
        value: "rnd_FL68EXuKRNilWSAeK8FUs0PmoVZe"
      - key: RENDER_OWNER_ID
        value: "tea-d8l9b1svikkc73chq4s0"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SMTP_HOST
        value: "smtp.gmail.com"
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: CORS_ORIGIN
        value: "https://nightfury-hosting-web.onrender.com"
      - key: SESSION_SECRET
        sync: false

    headers:
      - path: /api/*
        name: X-API-Version
        value: "1.0"

  # ── Frontend React static site ─────────────────────────────────────────────
  - type: web
    name: nightfury-hosting-web
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/build

    envVars:
      - key: REACT_APP_API_URL
        value: "https://nightfury-hosting-api.onrender.com/api"

    routes:
      - type: rewrite
        source: /*
        destination: /index.html
