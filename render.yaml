services:
  # ── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: nightfury-hosting-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      # Set all secrets below in the Render dashboard (Environment tab)
      # after first deploy — do NOT hardcode secrets in this file.
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_INIT_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: RENDER_API_KEY
        sync: false
      # REQUIRED: your Render owner/team ID
      # Get it: curl https://api.render.com/v1/owners -H "Authorization: Bearer <RENDER_API_KEY>"
      - key: RENDER_OWNER_ID
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: SMTP_HOST
        value: "smtp.gmail.com"
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: CORS_ORIGIN
        value: "https://nightfury-hosting-web.onrender.com"
      - key: SESSION_SECRET
        sync: false

  # ── Frontend React static site ─────────────────────────────────────────────
  - type: web
    name: nightfury-hosting-web
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/build

    envVars:
      - key: REACT_APP_API_URL
        value: "https://nightfury-hosting-api.onrender.com/api"

    routes:
      - type: rewrite
        source: /*
        destination: /index.html
