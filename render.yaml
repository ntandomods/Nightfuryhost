services:
  - type: web
    name: nightfury-hosting-api
    env: node
    plan: standard
    buildCommand: npm install
    startCommand: npm start
    
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RENDER_API_KEY
        sync: false
      - key: SMTP_HOST
        value: "smtp.gmail.com"
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CORS_ORIGIN
        value: "https://*.onrender.com,https://yourdomain.com"
      - key: SESSION_SECRET
        sync: false

    headers:
      - path: /api/*
        name: X-API-Version
        value: "1.0"

  - type: web
    name: nightfury-hosting-web
    env: node
    plan: standard
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    staticSite: true
    buildDir: frontend/build

    envVars:
      - key: REACT_APP_API_URL
        value: "https://nightfury-hosting-api.onrender.com/api"

databases:
  - name: nightfury-db
    databaseName: nightfury_hosting
    user: admin
    plan: standard
